<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Lacre 2x1 - Leanttro Tecnologia</title>
    <style>
        :root {
            --cor-fundo: CHAVE_COR_FUNDO;
            --cor-texto: CHAVE_COR_TEXTO;
            --cor-destaque: CHAVE_COR_DESTAQUE;
            --border-width: 7px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--cor-fundo);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 4vmin;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
        }
        
        .lacre-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--cor-fundo);
            border: var(--border-width) solid var(--cor-texto);
        }

        .row-top {
            display: flex;
            flex: 7;
            width: 100%;
            border-bottom: var(--border-width) solid var(--cor-texto);
            min-height: 0;
        }

       .area-logo {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2vw;
            overflow: hidden;
            min-width: 0;
            min-height: 0;
        }
        
        img.logo {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
        }

        .col-destaque {
            width: 15%;
            display: flex;
            flex-direction: column;
            border-left: var(--border-width) solid var(--cor-texto);
        }

        .cell-destaque {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--cor-destaque);
            font-weight: 900;
            /* min() garante que a fonte respeite tanto largura quanto altura,
               evitando overflow em lacres com proporção 3:1 ou mais largos */
            font-size: min(7vw, 14vh);
            line-height: 1;
            overflow: hidden;
        }

        .cell-destaque:not(:last-child) {
            border-bottom: var(--border-width) solid var(--cor-texto);
        }

        .row-bottom {
            display: flex;
            flex-direction: column;
            flex: 3;
            width: 100%;
        }

        .area-info {
            /* Aumentado de flex:1 para flex:1.4 — mais espaço para o texto não encostar nas bordas */
            flex: 1.4;
            display: flex;
            align-items: center;
            padding: 0 2vw;
            justify-content: center;
            border-bottom: var(--border-width) solid var(--cor-texto);
            color: var(--cor-texto);
            /* A barra INFO tem ~16% da altura total (flex 1.4/2.6 × 30%).
               A fonte fica em ~65% dessa altura: 0.65 × 16.15% ≈ 10.5vh.
               min(8vw) evita overflow em textos longos em lacres muito largos. */
            font-size: min(8vw, 10.5vh);
            font-weight: 900;
            white-space: nowrap;
            overflow: hidden;
        }

        .area-meses {
            display: flex;
            flex: 1.2;
        }

        .cell-mes {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: min(4.5vw, 11vh);
            color: var(--cor-texto);
            overflow: hidden;
        }

        .cell-mes:not(:last-child) {
            border-right: var(--border-width) solid var(--cor-texto);
        }
    </style>
</head>
<body>
    <div class="lacre-container">

        <div class="row-top">
            <div class="area-logo">
                <img src="CHAVE_LOGO" alt="Logo Cliente" class="logo">
            </div>
            <div class="col-destaque">
                <div class="cell-destaque">26</div>
                <div class="cell-destaque">27</div>
                <div class="cell-destaque">28</div>
            </div>
        </div>

        <div class="row-bottom">
            <div class="area-info">CHAVE_INFO</div>
            <div class="area-meses">
                <div class="cell-mes">J</div>
                <div class="cell-mes">F</div>
                <div class="cell-mes">M</div>
                <div class="cell-mes">A</div>
                <div class="cell-mes">M</div>
                <div class="cell-mes">J</div>
                <div class="cell-mes">J</div>
                <div class="cell-mes">A</div>
                <div class="cell-mes">S</div>
                <div class="cell-mes">O</div>
                <div class="cell-mes">N</div>
                <div class="cell-mes">D</div>
            </div>
        </div>

    </div>
</body>
</html>
